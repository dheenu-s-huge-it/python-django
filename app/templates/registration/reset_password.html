{% extends "base.html" %} {% block content %}
<div class="login-container">
  <h2>Set New Password</h2>
  <p
    class="subtitle"
    style="
      text-align: center;
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 20px;
    "
  >
    Please enter and confirm your new secure password below.
  </p>

  <form method="POST">
    {% csrf_token %}

    <!-- Display non-field errors (like your "Passwords do not match" validation) -->
    {% if form.non_field_errors %}
    <div
      class="error-message"
      style="
        color: #d80000;
        font-size: 0.85rem;
        margin-bottom: 15px;
        text-align: center;
      "
    >
      {{ form.non_field_errors }}
    </div>
    {% endif %} {{ form.as_p }}

    <button type="submit" class="login-btn">Update Password</button>
  </form>
</div>
{% endblock %}
