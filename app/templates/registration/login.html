{% extends "base.html" %} {% block content %}
<div class="login-container">
  <h2>Login</h2>

  <form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="login-btn">Login</button>
  </form>

  <div class="register-link">
    Don't you have an account? <a href="{% url 'app:register_user' %}">Register</a>
  </div>
</div>
{% endblock %}
