{% extends "base.html" %} 
{% block content %}
<div class="login-container">
    <h2>Forgot Password</h2>

    <form method="POST">
        {% csrf_token %} 
        {{ form.as_p }}

        <button type="submit" class="login-btn">Send Reset Link</button>
    </form>

    <div class="register-link">
        <a href="{% url 'app:login_user' %}">Back to Login</a>
    </div>
</div>
{% endblock %}
