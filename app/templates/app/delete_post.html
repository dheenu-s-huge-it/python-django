{% extends "base.html" %} {% block content %}

<div class="form-container">
  <h2>Delete Post</h2>

  <form method="POST">
    {% csrf_token %}
    <p>Are you sure you want to delete "{{ post.title }}"?</p>
    <button type="submit">Confirm Delete</button>
    <a href="{% url 'app:homepage' %}">Cancel</a>
  </form>
</div>

{% endblock %}
