{% extends "base.html" %} {% load static %} {% block content %}
<title>{% block title %} Contact {% endblock %}</title>
<h2>Contact</h2>
<!-- <img
  src="{% static 'images/logo.jpg' %}"

{% for con in contact %}
<article>
  <h3>{{ con.name|capfirst }}</h3>

  <p>{{ con.phone|truncatewords:25 }}</p>

  <br />

</article>

<hr />

{% empty %}
<p>Contacts not found<p>
{% endfor %} {% endblock %}
